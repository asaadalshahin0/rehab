// Storage
function loadState(){try{const d=localStorage.getItem("rehab-v3");return d?JSON.parse(d):{knee:{phase:1,sessions:[]},elbow:{phase:1,sessions:[]}};}catch{return{knee:{phase:1,sessions:[]},elbow:{phase:1,sessions:[]}};}}
function saveState(s){try{localStorage.setItem("rehab-v3",JSON.stringify(s));}catch(e){console.error(e);}}

// ── SFX ──
const _sfxCtx={c:null};
function getSfxCtx(){
  if(!_sfxCtx.c){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(AC)_sfxCtx.c=new AC();
  }
  if(_sfxCtx.c&&_sfxCtx.c.state==="suspended")_sfxCtx.c.resume();
  return _sfxCtx.c;
}
function _tone(freq,vol,start,dur,type="sine",ctx){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.start(start);o.stop(start+dur+0.01);
}
const sfx={
  tick(){try{const ctx=getSfxCtx();if(!ctx)return;const t=ctx.currentTime;_tone(900,0.12,t,0.07,"sine",ctx);}catch{}},
  restStart(){try{const ctx=getSfxCtx();if(!ctx)return;const t=ctx.currentTime;_tone(440,0.1,t,0.12,"sine",ctx);}catch{}},
  restDone(){try{const ctx=getSfxCtx();if(!ctx)return;const t=ctx.currentTime;[0,0.11,0.22].forEach((d,i)=>_tone([523,659,784][i],0.14,t+d,0.28,"sine",ctx));}catch{}},
  complete(){try{const ctx=getSfxCtx();if(!ctx)return;const t=ctx.currentTime;[0,0.1,0.2,0.3].forEach((d,i)=>_tone([523,659,784,1047][i],0.16,t+d,0.38,"sine",ctx));}catch{}},
  unlock(){try{const ctx=getSfxCtx();if(!ctx)return;const t=ctx.currentTime;[0,0.09,0.18,0.27,0.36,0.45].forEach((d,i)=>_tone([523,659,784,1047,1319,1568][i],0.15,t+d,0.55,"sine",ctx));}catch{}},
};

// ── Rest Timer ──
function RestTimer({seconds,onDone}){
  const[left,setLeft]=useState(seconds);
  const[active,setActive]=useState(false);
  const[done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(!active)return;
    ref.current=setInterval(()=>{
      setLeft(p=>{
        if(p<=1){clearInterval(ref.current);setDone(true);setActive(false);if(onDone)onDone();sfx.restDone();try{navigator.vibrate&&navigator.vibrate([80,40,80]);}catch{}return 0;}
        return p-1;
      });
    },1000);
    return()=>clearInterval(ref.current);
  },[active]);

  if(done)return(<div style={{textAlign:"center",padding:"8px 0",fontSize:11,fontFamily:"'Fira Code',monospace",color:"#22c55e",fontWeight:700,animation:"fadeIn 0.2s ease"}}>REST DONE — NEXT SET ↓</div>);

  const mins=Math.floor(left/60);
  const secs=left%60;
  const display=mins>0?`${mins}:${String(secs).padStart(2,"0")}`:`${secs}s`;
  const pct=(seconds-left)/seconds;

  return(<div style={{padding:"10px 0",display:"flex",alignItems:"center",gap:10,justifyContent:"center"}}>
    {!active?
      <button onClick={()=>{setActive(true);sfx.restStart();}} style={{padding:"6px 16px",borderRadius:8,border:"1px solid rgba(96,165,250,0.2)",background:"rgba(96,165,250,0.06)",color:"rgba(147,197,253,0.8)",fontSize:12,fontFamily:"'Fira Code',monospace",fontWeight:700,cursor:"pointer"}}>⏱ Rest {display}</button>
    :
      <div style={{display:"flex",alignItems:"center",gap:10,animation:"fadeIn 0.2s ease"}}>
        <div style={{width:120,height:6,borderRadius:3,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
          <div style={{width:`${pct*100}%`,height:"100%",borderRadius:3,background:"rgba(96,165,250,0.5)",transition:"width 1s linear"}}/>
        </div>
        <span style={{fontSize:16,fontFamily:"'Fira Code',monospace",fontWeight:700,color:"rgba(147,197,253,0.9)",minWidth:40,animation:left<=5?"timerPulse 1s ease infinite":"none"}}>{display}</span>
        <button onClick={()=>{clearInterval(ref.current);setDone(true);setActive(false);}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(255,255,255,0.25)",fontSize:10,fontFamily:"'Fira Code',monospace",cursor:"pointer"}}>Skip</button>
      </div>
    }
  </div>);
}

// ── Session Timer (overall elapsed) ──
function SessionTimer({startTime}){
  const[elapsed,setElapsed]=useState(0);
  useEffect(()=>{
    if(!startTime)return;
    const tick=()=>setElapsed(Math.round((Date.now()-startTime)/1000));
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[startTime]);
  const m=Math.floor(elapsed/60);
  const s=elapsed%60;
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 0",marginBottom:8}}>
    <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'Fira Code',monospace",textTransform:"uppercase",letterSpacing:1}}>Session</span>
    <span style={{fontSize:22,fontWeight:700,fontFamily:"'Fira Code',monospace",color:"rgba(255,255,255,0.6)",minWidth:60,textAlign:"center"}}>{m}:{String(s).padStart(2,"0")}</span>
  </div>);
}

// ── Components ──
function PainTrend({sessions,id}){
  if(sessions.length<2)return null;
  const vals=sessions.slice(-14).map(s=>s.dailyPain);
  const max=10,w=260,h=50,step=w/(vals.length-1);
  const pts=vals.map((v,i)=>`${i*step},${h-(v/max)*h}`).join(" ");
  const area=pts+` ${(vals.length-1)*step},${h} 0,${h}`;
  const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  const d=vals[vals.length-1]-vals[0];
  const tc=d<-1?"#22c55e":d>1?"#ef4444":"#eab308";
  const tl=d<-1?"Improving":d>1?"Worsening":"Stable";
  return React.createElement("div",{style:{margin:"10px 0 2px"}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
      React.createElement("span",{style:{fontSize:11,color:"rgba(255,255,255,0.22)",fontFamily:"'Fira Code',monospace"}},"Daily pain trend"),
      React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        React.createElement("span",{style:{fontSize:11,fontFamily:"'Fira Code',monospace",color:tc,fontWeight:700}},tl),
        React.createElement("span",{style:{fontSize:10,color:"rgba(255,255,255,0.18)",fontFamily:"'Fira Code',monospace"}},"avg "+avg))),
    <svg viewBox={`-4 -4 ${w+12} ${h+8}`} width="100%" height={h+8}>
      <defs><linearGradient id={`g-${id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={tc} stopOpacity="0.15"/><stop offset="100%" stopColor={tc} stopOpacity="0"/></linearGradient></defs>
      <line x1="0" y1={h-(DAILY_PAIN_THRESHOLD/max)*h} x2={w} y2={h-(DAILY_PAIN_THRESHOLD/max)*h} stroke="rgba(255,255,255,0.06)" strokeDasharray="3 3"/>
      <polygon points={area} fill={`url(#g-${id})`}/><polyline points={pts} fill="none" stroke={tc} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      {vals.map((v,i)=><circle key={i} cx={i*step} cy={h-(v/max)*h} r={i===vals.length-1?3.5:2} fill={i===vals.length-1?tc:"rgba(255,255,255,0.25)"} stroke={i===vals.length-1?"#0a0a0f":"none"} strokeWidth="2"/>)}
    </svg>);
}

function PainSlider({value,onChange,label,sub}){

  return(<div style={{marginBottom:16}}>

function PainProtocol({pain}){

  return(<div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
    <span style={{fontSize:10,fontFamily:"'Fira Code',monospace",fontWeight:600,color:"#4ade80",background:"rgba(34,197,94,0.08)",padding:"3px 8px",borderRadius:5,lineHeight:1.4}}>✓ {pain.ok}</span>

}

// ── Exercise Card with individual set checkboxes ──
function ExCard({ex,checked,onToggleSet,idx,active}){
  const setDesc=ex.duration?`${ex.duration}s ${ex.unit}`:`${ex.reps} ${ex.unit}${ex.holdSec?` · ${ex.holdSec}s hold`:""}`;
  const isNew=ex.notes?.startsWith("NEW");
  const allDone=Array.from({length:ex.sets},(_,s)=>checked[`${idx}-${s}`]).every(Boolean);

  return(<div style={{borderRadius:13,overflow:"hidden",background:allDone?"rgba(34,197,94,0.05)":"rgba(255,255,255,0.02)",border:allDone?"1.5px solid rgba(34,197,94,0.2)":"1.5px solid rgba(255,255,255,0.04)",transition:"all 0.15s",animation:`fadeIn 0.3s ease both`,animationDelay:`${idx*40}ms`}}>
    <div style={{padding:"13px 15px 8px"}}>
      <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
        <span style={{fontWeight:600,fontSize:14,color:allDone?"rgba(255,255,255,0.35)":"#fff",textDecoration:allDone?"line-through":"none"}}>{ex.name}</span>
        {isNew&&<span style={{fontSize:9,fontWeight:700,fontFamily:"'Fira Code',monospace",letterSpacing:1.2,color:"#c084fc",background:"rgba(192,132,252,0.08)",padding:"2px 6px",borderRadius:4}}>NEW</span>}
      </div>
      <div style={{fontSize:11.5,color:"rgba(255,255,255,0.22)",marginTop:4,lineHeight:1.4,fontStyle:"italic"}}>{(ex.notes||"").replace("NEW — ","")}</div>
      <PainProtocol pain={ex.pain}/>
    </div>

    {/* Individual sets */}
    <div style={{padding:"4px 15px 13px"}}>
      {Array.from({length:ex.sets},(_,s)=>{
        const key=`${idx}-${s}`;
        const isDone=!!checked[key];
        const prevDone=s===0||!!checked[`${idx}-${s-1}`];
        const showRest=isDone&&s<ex.sets-1&&!checked[`${idx}-${s+1}`]&&ex.rest>0;
        return(<div key={s}>
          <div onClick={active&&prevDone?()=>{if(!isDone)sfx.tick();onToggleSet(key);}:undefined} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:active&&prevDone?"pointer":"default",opacity:active&&!prevDone&&!isDone?0.35:1,transition:"opacity 0.2s"}}>
            {active&&<div style={{width:20,height:20,borderRadius:6,flexShrink:0,border:isDone?"none":"2px solid rgba(255,255,255,0.1)",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
              {isDone&&<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>}
            <span style={{fontSize:12,fontFamily:"'Fira Code',monospace",color:isDone?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.5)",textDecoration:isDone?"line-through":"none"}}>Set {s+1}</span>
            <span style={{fontSize:11,fontFamily:"'Fira Code',monospace",color:isDone?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.3)"}}>{setDesc}</span>
          </div>
          {showRest&&active&&<RestTimer key={`rest-${key}`} seconds={ex.rest||DEFAULT_REST}/>}
        </div>);
      })}
    </div>
  </div>);
}

function Streak({count,req}){return(<div style={{display:"flex",gap:5,alignItems:"center"}}>{Array.from({length:req},(_,i)=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:i<count?"#22c55e":"rgba(255,255,255,0.05)",border:i<count?"none":"1px solid rgba(255,255,255,0.07)"}}/>)}<span style={{fontSize:11,fontFamily:"'Fira Code',monospace",color:"rgba(255,255,255,0.25)",marginLeft:3}}>{count}/{req}</span></div>);}

function TL({total,cur}){return(<div style={{display:"flex",alignItems:"center",margin:"12px 0"}}>{Array.from({length:total},(_,i)=>{const p=i+1,a=p===cur,d=p<cur;return(<div key={p} style={{display:"flex",alignItems:"center",flex:1}}><div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Fira Code',monospace",fontSize:11,fontWeight:700,background:a?"#22c55e":d?"rgba(34,197,94,0.12)":"rgba(255,255,255,0.02)",color:a?"#000":d?"#22c55e":"rgba(255,255,255,0.1)",border:a?"none":`1.5px solid ${d?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.04)"}`,flexShrink:0,zIndex:1}}>{d?"✓":p}</div>{i<total-1&&<div style={{flex:1,height:2,background:d?"rgba(34,197,94,0.2)":"rgba(255,255,255,0.03)"}}/>}</div>);})}</div>);}

function Stat({label,value,sub,color="#fff"}){return(<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:11,padding:"11px 13px",flex:1,minWidth:0}}><div style={{fontSize:9.5,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:0.8}}>{label}</div><div style={{fontSize:19,fontWeight:700,fontFamily:"'Fira Code',monospace",color,marginTop:2}}>{value}</div>{sub&&<div style={{fontSize:10,color:"rgba(255,255,255,0.18)",marginTop:2}}>{sub}</div>}</div>);}

// ── Skip Day Check-In Modal (failsafe — logs yesterday's pain) ──
function SkipDayCheckin({tracks,onSubmit,onDismiss}){
  const[pains,setPains]=useState(()=>{const p={};tracks.forEach(t=>p[t]=3);return p;});
  const[skipped,setSkipped]=useState({});
  const toggleSkip=t=>setSkipped(p=>({...p,[t]:!p[t]}));
  const submit=()=>{
    const out={};
    tracks.forEach(t=>{ out[t]=skipped[t]?null:pains[t]; });
    onSubmit(out);
  };
  return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16,animation:"fadeIn 0.3s ease"}}>
    <div style={{background:"#111118",border:"1.5px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"28px 24px",maxWidth:340,width:"100%"}}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Yesterday's Check-In</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",lineHeight:1.6,marginBottom:6}}>You didn't log yesterday. This is for <span style={{color:"rgba(255,255,255,0.7)",fontWeight:600}}>yesterday</span> — best honest recall.</div>
      <div style={{fontSize:11,color:"rgba(96,165,250,0.5)",fontFamily:"'Fira Code',monospace",marginBottom:20}}>Can't remember? Hit Skip on that one.</div>
      {tracks.map(t=><div key={t} style={{marginBottom:16,opacity:skipped[t]?0.35:1,transition:"opacity 0.2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.6)"}}>{t==="knee"?"🦵 Knee":"💪 Elbow"} — daily life yesterday</div>
          <button onClick={()=>toggleSkip(t)} style={{background:skipped[t]?"rgba(96,165,250,0.12)":"rgba(255,255,255,0.04)",border:skipped[t]?"1px solid rgba(96,165,250,0.3)":"1px solid rgba(255,255,255,0.05)",color:skipped[t]?"rgba(96,165,250,0.8)":"rgba(255,255,255,0.25)",borderRadius:7,padding:"3px 9px",fontSize:10.5,fontFamily:"'Fira Code',monospace",fontWeight:700,cursor:"pointer"}}>
            {skipped[t]?"skipped":"skip"}
          </button>
        </div>
        {!skipped[t]&&<PainSlider value={pains[t]} onChange={v=>setPains(p=>({...p,[t]:v}))} label="" sub=""/>}
      </div>)}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={onDismiss} style={{flex:1,padding:12,borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(255,255,255,0.3)",fontSize:13,fontWeight:600,cursor:"pointer"}}>Dismiss</button>
        <button onClick={submit} style={{flex:2,padding:12,borderRadius:10,border:"none",background:"#22c55e",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Log Check-In</button>
      </div>
    </div>
  </div>);
}

// ── Rest Day Modal ──
function RestDayModal({track,onSubmit,onDismiss}){
  const[pain,setPain]=useState(3);
  return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16,animation:"fadeIn 0.3s ease"}}>
    <div style={{background:"#111118",border:"1.5px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"28px 24px",maxWidth:340,width:"100%"}}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{track==="knee"?"🦵 Knee":"💪 Elbow"} Rest Day</div>

        <button onClick={()=>onSubmit(track,pain)} style={{flex:2,padding:12,borderRadius:10,border:"none",background:"#22c55e",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Log Rest Day</button>

// ── App ──
function App(){
  const[state,setState]=useState(()=>loadState());
  const[track,setTrack]=useState(null);
  const[inSession,setInSession]=useState(false);
  const[checked,setChecked]=useState({});
  const[sPain,setSPain]=useState(3);
  const[dPain,setDPain]=useState(3);
  const[notes,setNotes]=useState("");
  const[unlock,setUnlock]=useState(null);
  const[vPhase,setVPhase]=useState(null);
  const[skipCheck,setSkipCheck]=useState(null);
  const[logRestDayFor,setLogRestDayFor]=useState(null);
  const sessionStartRef=useRef(null);

  // Failsafe: fire only if yesterday had no entry at all (rest day button wasn't used)
  useEffect(()=>{
    const st=loadState();
    const missed=[];
    ["knee","elbow"].forEach(t=>{
      const s=st[t].sessions;
      if(s.length===0)return;
      const hadYesterday=s.some(x=>x.date===YESTERDAY());
      const doneToday=s.some(x=>x.date===TODAY());
      if(!hadYesterday&&!doneToday)missed.push(t);
    });
    if(missed.length>0)setSkipCheck(missed);
  },[]);

  const goToTrack=useCallback(t=>{setTrack(t);setVPhase(null);history.pushState({view:"track",track:t},"");},[]);
  const goHome=useCallback(()=>{setTrack(null);setInSession(false);setChecked({});setVPhase(null);},[]);

  useEffect(()=>{
    const onBack=e=>{
      if(inSession){e.preventDefault();history.pushState(null,"");setInSession(false);setChecked({});setNotes("");sessionStartRef.current=null;}
      else if(track){goHome();}
    };
    window.addEventListener("popstate",onBack);
    return()=>window.removeEventListener("popstate",onBack);
  },[track,inSession,goHome]);

  const startSession=useCallback(()=>{setInSession(true);sessionStartRef.current=Date.now();history.pushState({view:"session"},"");},[]);
  const persist=useCallback(ns=>{setState(ns);saveState(ns);},[]);

  // Handle skip-day check-in submission — pain===null means user skipped that track
  const handleSkipCheckin=useCallback(pains=>{
    let ns={...state};
    Object.entries(pains).forEach(([t,pain])=>{
      if(pain===null)return;
      const checkin={date:YESTERDAY(),sessionPain:0,dailyPain:pain,phase:ns[t].phase,notes:"Missed day check-in",type:"checkin"};
      ns={...ns,[t]:{...ns[t],sessions:[...ns[t].sessions,checkin]}};
    });
    persist(ns);
    setSkipCheck(null);
  },[state,persist]);

  // Handle rest day button from dashboard
  const handleRestDay=useCallback((t,pain)=>{
    const entry={date:TODAY(),sessionPain:0,dailyPain:pain,phase:state[t].phase,notes:"Rest day",type:"restday"};
    persist({...state,[t]:{...state[t],sessions:[...state[t].sessions,entry]}});
    setLogRestDayFor(null);
  },[state,persist]);

  const phases=track==="knee"?KNEE_PHASES:ELBOW_PHASES;
  const ts=track?state[track]:null;
  const curPhase=ts?phases.find(p=>p.id===ts.phase):null;
  const dispPhase=vPhase?phases.find(p=>p.id===vPhase):curPhase;
  const pSess=ts?ts.sessions.filter(s=>s.phase===ts.phase):[];
  const pSessReal=pSess.filter(s=>s.type!=="checkin"&&s.type!=="restday");
  const dAvgSess=pSess.slice(-SESSIONS_TO_UNLOCK);
  const dAvg=dAvgSess.length?(dAvgSess.reduce((a,s)=>a+s.dailyPain,0)/dAvgSess.length).toFixed(1):"—";
  const sAvg=pSessReal.length?(pSessReal.reduce((a,s)=>a+s.sessionPain,0)/pSessReal.length).toFixed(1):"—";
  const canAdv=ts&&pSessReal.length>=SESSIONS_TO_UNLOCK&&parseFloat(dAvg)<=DAILY_PAIN_THRESHOLD&&ts.phase<phases.length;
  const doneToday=ts?ts.sessions.some(s=>s.date===TODAY()&&s.phase===ts.phase&&s.type!=="checkin"&&s.type!=="restday"):false;
  const pc=v=>v==="—"?"#555":parseFloat(v)<=2?"#22c55e":parseFloat(v)<=DAILY_PAIN_THRESHOLD?"#4ade80":parseFloat(v)<=5?"#eab308":"#ef4444";
  const sessWithDur=pSessReal.filter(s=>s.duration>0);
  const avgDurSec=sessWithDur.length?Math.round(sessWithDur.reduce((a,s)=>a+s.duration,0)/sessWithDur.length):null;
  const fmtDur=sec=>sec?`${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`:"—";

  // All sets checked?
  const exercises=dispPhase?.exercises||[];
  const allChecked=exercises.every((ex,ei)=>Array.from({length:ex.sets},(_,s)=>checked[`${ei}-${s}`]).every(Boolean));
  const isCur=(vPhase||ts?.phase)===ts?.phase;

  const complete=()=>{
    const durSec=sessionStartRef.current?Math.round((Date.now()-sessionStartRef.current)/1000):0;
    const sess={date:TODAY(),sessionPain:sPain,dailyPain:dPain,phase:ts.phase,notes:notes.trim(),setsCompleted:Object.values(checked).filter(Boolean).length,duration:durSec};
    const newS=[...ts.sessions.filter(s=>!(s.date===TODAY()&&s.phase===ts.phase&&s.type!=="checkin")),sess];
    persist({...state,[track]:{...ts,sessions:newS}});
    sfx.complete();
    setInSession(false);setChecked({});setSPain(3);setDPain(3);setNotes("");sessionStartRef.current=null;
    history.back();
  };

  const advance=()=>{const n=ts.phase+1;persist({...state,[track]:{...ts,phase:n}});sfx.unlock();setUnlock(n);setTimeout(()=>setUnlock(null),3500);};
  const reset=()=>{if(confirm("Reset all progress for this track?")){persist({...state,[track]:{phase:1,sessions:[]}});setVPhase(null);}};
  const root={minHeight:"100vh",minHeight:"100dvh",background:"#0a0a0f",color:"#fff",fontFamily:"'Outfit',sans-serif",maxWidth:460,margin:"0 auto",padding:"0 16px 100px"};

  // Skip day check-in overlay
  if(skipCheck)return(<div style={root}><SkipDayCheckin tracks={skipCheck} onSubmit={handleSkipCheckin} onDismiss={()=>setSkipCheck(null)}/></div>);

  // Rest day modal overlay
  const restDayOverlay=logRestDayFor?<RestDayModal track={logRestDayFor} onSubmit={handleRestDay} onDismiss={()=>setLogRestDayFor(null)}/>:null;

  // DASHBOARD
  if(!track){
    return(<div style={root}>
      {restDayOverlay}
      <div style={{padding:"44px 0 20px",animation:"fadeIn 0.35s ease"}}>
        <div style={{fontSize:10,fontFamily:"'Fira Code',monospace",color:"rgba(255,255,255,0.18)",letterSpacing:2.5,textTransform:"uppercase",marginBottom:8}}>Rehab Protocol</div>
        <h1 style={{fontSize:26,fontWeight:800,lineHeight:1.15,letterSpacing:-0.5}}>Your Recovery</h1>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.3)",marginTop:6}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>
      {[{key:"knee",label:"Right Knee",sub:"Patellar Tendinopathy",icon:"🦵",ph:KNEE_PHASES},{key:"elbow",label:"Right Elbow",sub:"Golfer's Elbow (Impact)",icon:"💪",ph:ELBOW_PHASES}].map((t,ti)=>{
        const d=state[t.key],phase=t.ph.find(p=>p.id===d.phase);
        const ps=d.sessions.filter(s=>s.phase===d.phase);
        const psReal=ps.filter(s=>s.type!=="checkin"&&s.type!=="restday");
        const done=d.sessions.some(s=>s.date===TODAY()&&s.phase===d.phase&&s.type!=="checkin"&&s.type!=="restday");
        const restToday=d.sessions.some(s=>s.date===TODAY()&&s.phase===d.phase&&s.type==="restday");
        const daS=ps.slice(-SESSIONS_TO_UNLOCK);const da=daS.length?(daS.reduce((a,s)=>a+s.dailyPain,0)/daS.length).toFixed(1):"—";
        return(<div key={t.key} onClick={()=>goToTrack(t.key)}
          style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.045)",borderRadius:18,padding:"20px 18px",marginBottom:12,cursor:"pointer",transition:"all 0.2s",animation:`fadeIn 0.4s ease both`,animationDelay:`${(ti+1)*80}ms`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><span style={{fontSize:18}}>{t.icon}</span><div style={{fontSize:17,fontWeight:700,marginTop:4}}>{t.label}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:2}}>{t.sub}</div></div>
            {done&&<span style={{fontSize:10,fontFamily:"'Fira Code',monospace",fontWeight:700,color:"#22c55e",background:"rgba(34,197,94,0.07)",padding:"3px 8px",borderRadius:6}}>DONE TODAY</span>}
            {restToday&&!done&&<span style={{fontSize:10,fontFamily:"'Fira Code',monospace",fontWeight:700,color:"rgba(96,165,250,0.7)",background:"rgba(96,165,250,0.07)",padding:"3px 8px",borderRadius:6}}>REST TODAY</span>}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",fontFamily:"'Fira Code',monospace",marginTop:12}}>Phase {d.phase}/{t.ph.length} · {phase?.name}</div>
          <div style={{marginTop:8}}><Streak count={psReal.length} req={SESSIONS_TO_UNLOCK}/></div>
          <div style={{display:"flex",gap:8,marginTop:12}}><Stat label="Total Sessions" value={d.sessions.filter(s=>s.type!=="checkin"&&s.type!=="restday").length}/><Stat label="Daily Pain Avg" value={da} color={pc(da)} sub={`Target: ≤${DAILY_PAIN_THRESHOLD}`}/></div>
          {ps.length>=2&&<PainTrend sessions={ps} id={`${t.key}-d`}/>}
          {!done&&!restToday&&<button onClick={e=>{e.stopPropagation();setLogRestDayFor(t.key);}} style={{width:"100%",marginTop:14,padding:"10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",color:"rgba(255,255,255,0.3)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>🛌 Log Rest Day</button>}
        </div>);
      })}
      <div style={{marginTop:16,padding:16,background:"rgba(255,255,255,0.012)",borderRadius:14,border:"1px solid rgba(255,255,255,0.025)"}}>
        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Progression Rules</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",lineHeight:1.7}}>Complete <strong style={{color:"rgba(255,255,255,0.45)"}}>{SESSIONS_TO_UNLOCK} sessions</strong> with a <strong style={{color:"rgba(255,255,255,0.45)"}}>daily-life pain avg ≤ {DAILY_PAIN_THRESHOLD}/10</strong> to unlock the next phase. Rest-day check-ins feed your pain average but don't count as sessions.</div>
      </div>
    </div>);
  }

  // TRACK DETAIL
  return(<div style={root}>
    {unlock&&<div onClick={()=>setUnlock(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"fadeIn 0.2s ease"}}>
      <div style={{background:"#111118",border:"1.5px solid rgba(34,197,94,0.25)",borderRadius:22,padding:"44px 32px",textAlign:"center",maxWidth:300,animation:"burst 0.5s ease"}}>
        <div style={{fontSize:52,marginBottom:14}}>🔓</div><div style={{fontSize:22,fontWeight:800}}>Phase {unlock}</div>
        <div style={{fontSize:15,color:"#22c55e",fontWeight:600,marginTop:4}}>{phases.find(p=>p.id===unlock)?.name}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.3)",marginTop:10,lineHeight:1.5}}>{phases.find(p=>p.id===unlock)?.rationale}</div>
      </div>
    </div>}

    <div style={{padding:"18px 0 10px",display:"flex",alignItems:"center",gap:12,animation:"fadeIn 0.25s ease"}}>
      <button onClick={()=>history.back()} style={{background:"rgba(255,255,255,0.04)",border:"none",color:"#fff",width:34,height:34,borderRadius:9,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
      <div><div style={{fontSize:16,fontWeight:700}}>{track==="knee"?"🦵 Right Knee":"💪 Right Elbow"}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{track==="knee"?"Patellar Tendinopathy":"Golfer's Elbow (Impact)"}</div></div>
    </div>

    <TL total={phases.length} cur={ts.phase}/>

    <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
      {phases.map(p=>{const locked=p.id>ts.phase,active=(vPhase||ts.phase)===p.id;
        return <button key={p.id} onClick={()=>!locked&&setVPhase(p.id)} disabled={locked} style={{padding:"5px 11px",borderRadius:7,border:"none",fontSize:10.5,fontFamily:"'Fira Code',monospace",fontWeight:700,cursor:locked?"not-allowed":"pointer",background:active?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.015)",color:locked?"rgba(255,255,255,0.08)":active?"#fff":"rgba(255,255,255,0.3)",whiteSpace:"nowrap"}}>{locked?"🔒 ":""}P{p.id}</button>;
      })}
    </div>

    <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:16,padding:18,marginBottom:14,animation:"fadeIn 0.3s ease"}}>
      <div style={{fontSize:15,fontWeight:700}}>Phase {dispPhase?.id}: {dispPhase?.name}</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:6,lineHeight:1.6,borderLeft:"2px solid rgba(255,255,255,0.05)",paddingLeft:12}}>{dispPhase?.rationale}</div>
      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginTop:12,padding:"10px 12px",background:"rgba(96,165,250,0.04)",border:"1px solid rgba(96,165,250,0.08)",borderRadius:10}}><span style={{fontSize:14,flexShrink:0}}>📅</span><div style={{fontSize:12,color:"rgba(147,197,253,0.7)",lineHeight:1.5}}>{dispPhase?.freq}</div></div>
      {dispPhase?.flareProtocol&&<div style={{marginTop:12,padding:"12px 14px",background:"rgba(251,146,60,0.04)",border:"1px solid rgba(251,146,60,0.1)",borderRadius:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:14}}>🛟</span><span style={{fontSize:10,fontWeight:700,color:"rgba(251,191,36,0.85)",textTransform:"uppercase",letterSpacing:0.5,fontFamily:"'Fira Code',monospace"}}>If Pain Returns</span></div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.7}}>{dispPhase.flareProtocol}</div>
      </div>}
      {isCur&&<>
        <div style={{display:"flex",gap:7,marginTop:14}}>
          <Stat label="Sessions" value={pSessReal.length} sub={ts.phase===phases.length?"maintenance":`of ${SESSIONS_TO_UNLOCK}`}/>
          <Stat label="Daily Pain" value={dAvg} color={pc(dAvg)} sub={ts.phase===phases.length?`Target: ≤${DAILY_PAIN_THRESHOLD}`:`≤${DAILY_PAIN_THRESHOLD} to advance`}/>
          <Stat label="Sess. Pain" value={sAvg} color={pc(sAvg)} sub="Info only"/>
          <Stat label="Avg Time" value={fmtDur(avgDurSec)} sub="per session"/>
        </div>
        <div style={{marginTop:10}}><Streak count={Math.min(pSessReal.length,SESSIONS_TO_UNLOCK)} req={SESSIONS_TO_UNLOCK}/></div>
        <PainTrend sessions={pSess} id={`${track}-det`}/>
      </>}
    </div>

    {canAdv&&!inSession&&isCur&&<button onClick={advance} style={{width:"100%",padding:"15px",borderRadius:14,border:"2px solid rgba(34,197,94,0.3)",background:"rgba(34,197,94,0.05)",color:"#22c55e",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14,animation:"pulse 2s ease infinite"}}>🔓 Unlock Phase {ts.phase+1}: {phases.find(p=>p.id===ts.phase+1)?.name}</button>}

    {!canAdv&&pSessReal.length>=SESSIONS_TO_UNLOCK&&parseFloat(dAvg)>DAILY_PAIN_THRESHOLD&&isCur&&!inSession&&<div style={{padding:"13px 15px",borderRadius:12,background:"rgba(239,68,68,0.04)",border:"1px solid rgba(239,68,68,0.1)",marginBottom:14,fontSize:13,color:"rgba(255,255,255,0.5)",lineHeight:1.6}}>⚠️ Sessions complete, but daily pain avg is {dAvg}/10 — needs to be ≤{DAILY_PAIN_THRESHOLD}. Keep at it.</div>}

    {ts.phase===phases.length&&pSessReal.length>=SESSIONS_TO_UNLOCK&&parseFloat(dAvg)<=DAILY_PAIN_THRESHOLD&&isCur&&!inSession&&<div style={{padding:"16px",borderRadius:14,background:"rgba(34,197,94,0.04)",border:"1.5px solid rgba(34,197,94,0.15)",marginBottom:14}}><div style={{fontSize:15,fontWeight:700,color:"#22c55e",marginBottom:6}}>🏆 Maintenance Mode</div><div style={{fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.7}}>Keep logging 2-3x per week. If pain creeps back, check the flare protocol.</div></div>}

    {inSession&&<SessionTimer startTime={sessionStartRef.current}/>}

    {inSession&&dispPhase?.warmup&&<div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",background:"rgba(250,204,21,0.04)",border:"1px solid rgba(250,204,21,0.1)",borderRadius:12,marginBottom:12,animation:"fadeIn 0.25s ease"}}><span style={{fontSize:16,flexShrink:0}}>🔥</span><div><div style={{fontSize:12,fontWeight:700,color:"rgba(253,224,71,0.8)",marginBottom:2}}>Warm up first</div><div style={{fontSize:12,color:"rgba(255,255,255,0.35)",lineHeight:1.5}}>{dispPhase.warmup}</div></div></div>}

    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,fontFamily:"'Fira Code',monospace",color:"rgba(255,255,255,0.18)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>Exercises · {exercises.length}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {exercises.map((ex,i)=><ExCard key={i} ex={ex} idx={i} active={inSession&&isCur} checked={checked} onToggleSet={key=>setChecked(p=>({...p,[key]:!p[key]}))}/>)}
      </div>
    </div>

    {isCur&&<>
      {!inSession&&!doneToday&&<button onClick={startSession} style={{width:"100%",padding:"15px",borderRadius:14,border:"none",background:"#22c55e",color:"#000",fontSize:15,fontWeight:700,cursor:"pointer"}}>Start Session</button>}
      {doneToday&&!inSession&&<div style={{width:"100%",padding:"15px",borderRadius:14,border:"1px solid rgba(34,197,94,0.12)",background:"rgba(34,197,94,0.03)",color:"#22c55e",fontSize:14,fontWeight:600,textAlign:"center"}}>✓ Session completed today</div>}
      {inSession&&<div style={{animation:"fadeIn 0.25s ease"}}>
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:16,padding:18,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Post-Session Check-In</div>
          <PainSlider value={sPain} onChange={setSPain} label="During the exercises" sub="How much did it hurt? (tracked but doesn't gate you)"/>
          <PainSlider value={dPain} onChange={setDPain} label="Daily life right now" sub={`How does your ${track==="knee"?"knee":"elbow"} feel doing normal things? This gates progression.`}/>
          <div style={{marginTop:4}}>
            <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.45)",marginBottom:4}}>Notes <span style={{fontWeight:400,color:"rgba(255,255,255,0.18)"}}>(optional)</span></div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Anything notable?" rows={2} style={{width:"100%",padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.05)",color:"#fff",fontSize:13,resize:"vertical",outline:"none"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>history.back()} style={{flex:1,padding:14,borderRadius:12,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"rgba(255,255,255,0.35)",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={complete} disabled={!allChecked} style={{flex:2,padding:14,borderRadius:12,border:"none",background:allChecked?"#22c55e":"rgba(255,255,255,0.03)",color:allChecked?"#000":"rgba(255,255,255,0.12)",fontSize:14,fontWeight:700,cursor:allChecked?"pointer":"not-allowed"}}>Complete Session</button>
        </div>
      </div>}
    </>}

    {pSess.length>0&&isCur&&!inSession&&<div style={{marginTop:20}}>
      <div style={{fontSize:10,fontFamily:"'Fira Code',monospace",color:"rgba(255,255,255,0.18)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>Recent Sessions</div>
      {pSess.slice(-5).reverse().map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 13px",borderRadius:9,background:"rgba(255,255,255,0.012)",border:"1px solid rgba(255,255,255,0.025)",marginBottom:4,fontSize:11.5}}>
        <div style={{minWidth:0,flex:1}}><span style={{color:"rgba(255,255,255,0.4)",fontFamily:"'Fira Code',monospace"}}>{s.date}</span>{(s.type==="checkin"||s.type==="restday")&&<span style={{color:"rgba(96,165,250,0.5)",marginLeft:6,fontSize:10,fontFamily:"'Fira Code',monospace"}}>{s.type==="restday"?"REST DAY":"MISSED DAY"}</span>}{s.duration>0&&<span style={{color:"rgba(147,197,253,0.65)",marginLeft:8,fontSize:10.5,fontFamily:"'Fira Code',monospace",fontWeight:700,background:"rgba(96,165,250,0.07)",padding:"1px 6px",borderRadius:4}}>⏱ {Math.floor(s.duration/60)}:{String(s.duration%60).padStart(2,"0")}</span>}{s.notes&&s.type!=="checkin"&&s.type!=="restday"&&<span style={{color:"rgba(255,255,255,0.18)",marginLeft:8,fontStyle:"italic"}}>{s.notes}</span>}</div>
        <div style={{display:"flex",gap:10,fontFamily:"'Fira Code',monospace",flexShrink:0}}>{s.type!=="checkin"&&<span style={{color:"rgba(255,255,255,0.25)"}}>sess:<span style={{color:pc(String(s.sessionPain))}}>{s.sessionPain}</span></span>}<span style={{color:"rgba(255,255,255,0.25)"}}>daily:<span style={{color:pc(String(s.dailyPain)),fontWeight:700}}>{s.dailyPain}</span></span></div>
      </div>)}
    </div>}

    <div style={{marginTop:32,textAlign:"center"}}><button onClick={reset} style={{background:"none",border:"none",color:"rgba(255,255,255,0.08)",fontSize:11,fontFamily:"'Fira Code',monospace",cursor:"pointer"}}>Reset progress</button></div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
